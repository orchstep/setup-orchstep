name: e2e

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  examples:
    strategy:
      fail-fast: false
      matrix:
        example: [node-ci, go-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup OrchStep
        uses: ./
        with:
          version: latest
      - name: Run the example workflow
        working-directory: examples/${{ matrix.example }}
        run: orchstep run
