name: e2e

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  examples:
    strategy:
      fail-fast: false
      matrix:
        example: [node-ci, go-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup OrchStep
        uses: ./
        with:
          version: latest
      - name: Setup Node.js
        if: matrix.example == 'node-ci'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup Go
        if: matrix.example == 'go-ci'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run the example workflow
        working-directory: examples/${{ matrix.example }}
        run: orchstep run
